services:
  - type: web
    name: skainet-backend
    env: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        value: "your_jwt_secret"
      - key: PORT
        value: "8080"
  - type: static
    name: skainet-frontend
    env: static
    plan: free
    staticPublishPath: frontend/dist
    buildCommand: "cd frontend && npm install && npm run build"
    envVars:
      - key: VITE_API_URL
        value: "https://skainet-backend.onrender.com"
