<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKAINET – Nuevo Pedido</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-container" style="display:flex; justify-content:center; align-items:center; min-height:100vh;">
  <div class="glass-panel minimalist-form animate-fade-in" style="width:100%; max-width:500px; padding:40px;">
    <header class="form-header" style="margin-bottom:30px; flex-direction:column; align-items:center;">
      <h2 class="gold-text text-center" style="font-size:1.5rem;">NUEVO PEDIDO</h2>
      <p class="text-center text-muted mt-10">Registro independiente de clientes</p>
    </header>

    <!-- Success message (visible por defecto para el boceto) -->
    <div class="success-box animate-fade-in mb-30">
      <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 10px; display:block;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <h3 style="margin-bottom:10px; color:#fff;">¡Pedido Registrado!</h3>
      <p class="text-gray" style="font-size:0.8rem; margin-bottom:15px;">El código asignado es: <b class="gold-text">P-a1b2c3</b></p>
      <div style="background:rgba(0,0,0,0.4); padding:10px; border-radius:4px; word-break:break-all; margin-bottom:20px;">
        <a href="05-tracking.html" style="color:var(--info);">http://localhost:5173/track/a1b2c3</a>
      </div>
      <button class="btn-whatsapp">📱 ENVIAR POR WHATSAPP</button>
    </div>

    <!-- Formulario -->
    <form>
      <div class="flex-col gap-20 mb-30">
        <div class="weight-box">
          <input type="text" placeholder="Nombre y Apellido" required>
          <label>👤 NOMBRE CLIENTE</label>
        </div>
        <div class="weight-box">
          <input type="email" placeholder="Email de contacto">
          <label>✉ CORREO ELECTRÓNICO</label>
        </div>
        <div class="weight-box">
          <input type="tel" placeholder="+57 300...">
          <label>📱 CELULAR / WHATSAPP</label>
        </div>
        <div class="weight-box">
          <input type="text" placeholder="Ej. Argolla Matrimonio 18k" required>
          <label>🖼 DISEÑO / PIEZA</label>
        </div>
        <div class="weight-box">
          <input type="number" step="0.1" placeholder="0.0 g" required>
          <label>⚖ PESO EST. (g)</label>
        </div>
      </div>
      <button type="submit" class="action-btn-gold" style="font-size:1rem;">✔ CONFIRMAR Y REGISTRAR</button>
    </form>
  </div>
</div>

<!-- Nav -->
<nav style="position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.9);border-top:1px solid #222;padding:10px 20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;z-index:999;">
  <a href="01-login.html" style="color:#888;font-size:0.7rem;padding:4px 10px;border:1px solid #333;border-radius:20px;">① Login</a>
  <a href="02-dashboard-admin.html" style="color:#888;font-size:0.7rem;padding:4px 10px;border:1px solid #333;border-radius:20px;">② Dashboard Admin</a>
  <a href="03-dashboard-joyero.html" style="color:#888;font-size:0.7rem;padding:4px 10px;border:1px solid #333;border-radius:20px;">③ Dashboard Joyero</a>
  <a href="04-nuevo-pedido.html" style="color:var(--gold);font-size:0.7rem;padding:4px 10px;border:1px solid var(--gold);border-radius:20px;">④ Nuevo Pedido</a>
  <a href="05-tracking.html" style="color:#888;font-size:0.7rem;padding:4px 10px;border:1px solid #333;border-radius:20px;">⑤ Tracking</a>
</nav>
</body>
</html>
